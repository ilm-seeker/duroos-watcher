name: Tauri Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS Apple Silicon
            os: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            rust_target: ""
            args: ""
          - name: Ubuntu
            os: ubuntu-22.04
            rust_target: ""
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ubuntu Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.platform.rust_target != ''
        run: rustup target add ${{ matrix.platform.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Release repo checks
        run: npm run release:check

      - name: Build Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Duroos Watcher ${{ github.ref_name }}"
          releaseBody: "Unsigned artifacts are alpha/testing only. Treat signed and notarized artifacts as production."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.platform.args }}

      - name: Generate artifact checksums
        shell: bash
        run: |
          node <<'NODE'
          const { createHash } = require('node:crypto');
          const { readdirSync, readFileSync, statSync, writeFileSync } = require('node:fs');
          const { join } = require('node:path');
          const root = 'src-tauri/target';
          const suffixes = ['.dmg', '.app.tar.gz', '.msi', '.exe', '.AppImage', '.deb'];
          const files = [];
          const walk = (dir) => {
            for (const entry of readdirSync(dir)) {
              const path = join(dir, entry);
              const stat = statSync(path);
              if (stat.isDirectory()) walk(path);
              else if (suffixes.some((suffix) => path.endsWith(suffix))) files.push(path);
            }
          };
          walk(root);
          files.sort();
          const lines = files.map((file) => {
            const hash = createHash('sha256').update(readFileSync(file)).digest('hex');
            return `${hash}  ${file}`;
          });
          writeFileSync('artifact-checksums.txt', `${lines.join('\n')}\n`);
          NODE

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform.name }}
          path: artifact-checksums.txt
