name: Tauri Release

on:
  push:
    tags:
      - "v*"
      - "!v*-alpha*"

permissions:
  contents: write

jobs:
  build-release:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS Apple Silicon
            os: macos-latest
            rust_target: aarch64-apple-darwin
            media_tools_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            media_tools_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            rust_target: ""
            media_tools_target: x86_64-pc-windows-msvc
            args: ""
          - name: Ubuntu
            os: ubuntu-22.04
            rust_target: ""
            media_tools_target: x86_64-unknown-linux-gnu
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ubuntu Tauri dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: |
          sudo find /etc/apt -maxdepth 2 -type f \( -name "*.sources" -o -name "*.list" -o -name "sources.list" \) -print0 \
            | sudo xargs -0 sed -i \
              -e 's|mirror+file:/etc/apt/apt-mirrors.txt|https://archive.ubuntu.com/ubuntu|g' \
              -e 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g'
          sudo env DEBIAN_FRONTEND=noninteractive apt-get update \
            -o Acquire::Retries=3 \
            -o Acquire::ForceIPv4=true \
            -o Acquire::http::Timeout=20 \
            -o Acquire::https::Timeout=20
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.platform.rust_target != ''
        run: rustup target add ${{ matrix.platform.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Release repo checks
        run: npm run release:check

      - name: Fetch pinned media tools
        run: npm run media-tools:fetch -- --target=${{ matrix.platform.media_tools_target }}

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ vars.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: |
          $required = @(
            "WINDOWS_CERTIFICATE",
            "WINDOWS_CERTIFICATE_PASSWORD",
            "WINDOWS_CERTIFICATE_THUMBPRINT",
            "WINDOWS_TIMESTAMP_URL"
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "$name is required for Windows release signing."
            }
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "duroos-watcher-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $expectedThumbprint = ($env:WINDOWS_CERTIFICATE_THUMBPRINT -replace '\s+', '').ToUpperInvariant()
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          if ($certificate.Thumbprint -ne $expectedThumbprint) {
            throw "Imported Windows certificate thumbprint does not match WINDOWS_CERTIFICATE_THUMBPRINT."
          }

      - name: Prepare Windows signing config
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ vars.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: node scripts/prepare-windows-signing.mjs

      - name: Build Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ vars.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Duroos Watcher ${{ github.ref_name }}"
          releaseBody: "Unsigned artifacts are alpha/testing only. Treat signed and notarized artifacts as production."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.platform.args }}

      - name: Audit release artifacts
        run: npm run release:audit-artifacts -- --out=artifact-checksums.txt --json=artifact-audit.json

      - name: Upload artifact audit
        uses: actions/upload-artifact@v4
        with:
          name: artifact-audit-${{ matrix.platform.name }}
          path: |
            artifact-checksums.txt
            artifact-audit.json
            src-tauri/binaries/vendor/${{ matrix.platform.media_tools_target }}/media-tools-report.json
