name: Unsigned Alpha Release

on:
  push:
    tags:
      - "v*-alpha*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing alpha tag to package, for example v0.1.0-alpha.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-alpha:
    name: Build unsigned alpha (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            media_tools_target: aarch64-apple-darwin
            build_command: npm run tauri:build:app
          - name: Windows
            os: windows-latest
            media_tools_target: x86_64-pc-windows-msvc
            build_command: npm run tauri:build:full
          - name: Linux
            os: ubuntu-22.04
            media_tools_target: x86_64-unknown-linux-gnu
            build_command: npm run tauri:build:full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install Ubuntu Tauri dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: |
          sudo find /etc/apt -maxdepth 2 -type f \( -name "*.sources" -o -name "*.list" -o -name "sources.list" \) -print0 \
            | sudo xargs -0 sed -i \
              -e 's|mirror+file:/etc/apt/apt-mirrors.txt|https://archive.ubuntu.com/ubuntu|g' \
              -e 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g'
          sudo env DEBIAN_FRONTEND=noninteractive apt-get update \
            -o Acquire::Retries=3 \
            -o Acquire::ForceIPv4=true \
            -o Acquire::http::Timeout=20 \
            -o Acquire::https::Timeout=20
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Release repo checks
        run: npm run release:check

      - name: Fetch pinned media tools
        run: npm run media-tools:fetch -- --target=${{ matrix.platform.media_tools_target }}

      - name: Build unsigned app artifacts
        run: ${{ matrix.platform.build_command }}

      - name: Package macOS app zip
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Duroos Watcher.app" \
            "release-assets/Duroos-Watcher-${TAG_NAME}-macos-unsigned.app.zip"
          (cd release-assets && shasum -a 256 * > "SHA256SUMS-${TAG_NAME}-macos.txt")

      - name: Package Windows installers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $installers = Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in ".msi", ".exe" }
          if (-not $installers) {
            throw "No Windows installer artifacts were found."
          }
          foreach ($installer in $installers) {
            Copy-Item $installer.FullName -Destination (Join-Path "release-assets" "Duroos-Watcher-$($env:TAG_NAME)-windows-unsigned-$($installer.Name)")
          }
          Get-ChildItem release-assets -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = Get-FileHash -Algorithm SHA256 $_.FullName
              "$($hash.Hash.ToLowerInvariant())  $($_.Name)"
            } |
            Set-Content -Encoding ascii "release-assets/SHA256SUMS-$($env:TAG_NAME)-windows.txt"

      - name: Package Linux installers
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-assets
          while IFS= read -r -d '' artifact; do
            cp "$artifact" "release-assets/Duroos-Watcher-${TAG_NAME}-linux-unsigned-$(basename "$artifact")"
          done < <(find src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) -print0)
          if ! find release-assets -type f | grep -q .; then
            echo "No Linux installer artifacts were found." >&2
            exit 1
          fi
          (cd release-assets && shasum -a 256 * > "SHA256SUMS-${TAG_NAME}-linux.txt")

      - name: Upload packaged alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpha-assets-${{ matrix.platform.name }}
          path: release-assets/*
          if-no-files-found: error

  publish-alpha:
    name: Publish unsigned alpha prerelease
    runs-on: ubuntu-latest
    needs: build-alpha
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Download packaged alpha artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: alpha-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub prerelease
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Duroos Watcher ${TAG_NAME} (unsigned alpha)" \
              --notes-file docs/release/unsigned-alpha-install-notes.md \
              --prerelease
          else
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Duroos Watcher ${TAG_NAME} (unsigned alpha)" \
              --notes-file docs/release/unsigned-alpha-install-notes.md \
              --prerelease
          fi

          mapfile -d '' files < <(find release-assets -type f -print0)
          gh release upload "$TAG_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
